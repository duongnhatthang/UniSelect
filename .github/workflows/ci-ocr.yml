name: OCR CI smoke test

on:
  push:
    paths:
      - 'scripts/ocr_table.py'
      - '.github/workflows/ci-ocr.yml'
  workflow_dispatch:

env:
  PADDLE_PDX_MODEL_SOURCE: BOS
  PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: 'True'

jobs:
  ocr-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache PaddleOCR models (~/.paddlex)
        uses: actions/cache@v4
        with:
          path: ~/.paddlex
          key: paddleocr-models-${{ runner.os }}-${{ hashFiles('scripts/ocr_table.py') }}
          restore-keys: |
            paddleocr-models-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Warm up / download PaddleOCR models
        run: python3 -c "from paddleocr import PaddleOCR; PaddleOCR(lang='vi', use_gpu=False, show_log=False)"

      - name: Generate synthetic test image
        run: python3 tests/fixtures/ocr-smoke-generator.py /tmp/ocr-smoke.jpg

      - name: Run OCR smoke test
        run: |
          python3 scripts/ocr_table.py /tmp/ocr-smoke.jpg /tmp/ocr-output.json
          python3 -c "
          import json, sys
          data = json.load(open('/tmp/ocr-output.json'))
          assert len(data['lines']) > 0, f'OCR returned 0 lines from smoke image'
          print(f'OCR smoke passed: {len(data[\"lines\"])} lines extracted')
          "
