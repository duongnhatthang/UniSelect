name: Scrape cutoff scores (low frequency)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      PADDLE_PDX_MODEL_SOURCE: BOS
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: 'True'
    strategy:
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Cache PaddleOCR models (~/.paddlex)
        uses: actions/cache@v4
        with:
          path: ~/.paddlex
          key: paddleocr-models-${{ runner.os }}-${{ hashFiles('scripts/ocr_table.py') }}
          restore-keys: |
            paddleocr-models-${{ runner.os }}-
      - name: Install PaddleOCR
        run: pip install paddleocr
      - name: Warm up PaddleOCR models
        run: python3 -c "from paddleocr import PaddleOCR; PaddleOCR(lang='vi', use_gpu=False)"
      - name: Run scraper shard ${{ matrix.shard }}/6
        run: npx tsx lib/scraper/run.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 6
